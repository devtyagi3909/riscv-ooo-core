name: Verilog CI

# This triggers the workflow on every push or pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Run Verilator Lint
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Verilator on the GitHub server
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      # 3. Run the tuned linting check on your RTL folder
      - name: Lint Verilog Files
        run: |
          verilator --lint-only -Wall -Wno-UNUSED -Wno-WIDTH -Wno-MULTIDRIVEN --top-module ooo_top rtl/*.v